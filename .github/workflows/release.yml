name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify skills/natural-japanese is in sync with root sources
        run: |
          set -euo pipefail
          # The .skill archive below is built from the root sources (SKILL.md,
          # references/, scripts/, assets/), not from skills/natural-japanese/,
          # so running scripts/sync-skill.sh here wouldn't actually protect the
          # release artifact from drift. Instead, fail the release outright if
          # skills/natural-japanese/ (the plugin-marketplace copy) has drifted
          # from the root — that copy should always be produced by
          # scripts/sync-skill.sh (see its pre-commit hook) and committed.
          expected="$(mktemp -d)"
          mkdir -p "${expected}/natural-japanese"
          cp SKILL.md "${expected}/natural-japanese/SKILL.md"
          cp -R references "${expected}/natural-japanese/references"
          cp -R assets "${expected}/natural-japanese/assets"
          mkdir -p "${expected}/natural-japanese/scripts"
          for entry in scripts/*; do
            base="$(basename "${entry}")"
            case "${base}" in
              sync-skill.sh|check-fixtures.sh|__pycache__) continue ;;
            esac
            cp -R "${entry}" "${expected}/natural-japanese/scripts/${base}"
          done
          if ! diff -r "${expected}/natural-japanese" skills/natural-japanese; then
            echo "::error::skills/natural-japanese/ is out of sync with the root skill sources (SKILL.md, references/, scripts/, assets/). Run scripts/sync-skill.sh and commit the result before releasing." >&2
            exit 1
          fi
          rm -rf "${expected}"

      - name: Run fixture regression check
        run: scripts/check-fixtures.sh

      - name: Build natural-japanese.skill
        run: |
          set -euo pipefail
          zip -r natural-japanese.skill SKILL.md references scripts assets \
            -x 'scripts/__pycache__/*' -x 'scripts/check-fixtures.sh'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: natural-japanese.skill
          generate_release_notes: true
