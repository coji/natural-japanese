name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run fixture regression check
        run: dev/check-fixtures.sh

      - name: Build natural-japanese.skill
        run: |
          set -euo pipefail
          cd skills/natural-japanese
          zip -r "${GITHUB_WORKSPACE}/natural-japanese.skill" SKILL.md references scripts assets \
            -x 'scripts/__pycache__/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: natural-japanese.skill
          generate_release_notes: true
