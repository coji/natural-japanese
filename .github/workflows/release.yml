name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build natural-japanese.skill
        run: |
          set -euo pipefail
          zip -r natural-japanese.skill SKILL.md references scripts assets \
            -x 'scripts/__pycache__/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: natural-japanese.skill
          generate_release_notes: true
